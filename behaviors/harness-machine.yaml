bundle:
  name: harness-machine-behavior
  version: 0.2.0
  description: |
    Mounts the modes system and registers agents for mini-amplifier factory workflows.
    Provides 8 modes, 11 agents, and 3 skills for constraint harness development
    across pico/nano/micro tiers.

includes:
  - bundle: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=behaviors/modes.yaml

hooks:
  - module: hooks-mode
    source: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=modules/hooks-mode
    config:
      search_paths:
        # Note: @harness-machine: prefix is resolved by the hooks-mode module,
        # not by the bundle loader. hooks-mode performs its own @mention resolution
        # to locate mode YAML files within this bundle at runtime.
        - "@harness-machine:modes"

tools:
  - module: tool-mode
    source: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=modules/tool-mode
    config:
      gate_policy: "warn"
  - module: tool-skills
    source: git+https://github.com/microsoft/amplifier-module-tool-skills@main
    config:
      skills:
        # Note: @harness-machine: prefix is resolved by the tool-skills module,
        # not by the bundle loader. tool-skills performs its own @mention resolution
        # to locate skill directories within this bundle at runtime.
        - "@harness-machine:skills"

agents:
  include:
    - harness-machine:environment-analyst
    - harness-machine:mission-architect
    - harness-machine:capability-advisor
    - harness-machine:spec-writer
    - harness-machine:plan-writer
    - harness-machine:harness-generator
    - harness-machine:harness-critic
    - harness-machine:harness-refiner
    - harness-machine:harness-evaluator
    - harness-machine:upgrade-checker
    - harness-machine:upgrade-planner

context:
  include:
    - harness-machine:context/instructions.md
    - harness-machine:context/philosophy.md
    - harness-machine:context/pattern.md
    - modes:context/modes-instructions.md
