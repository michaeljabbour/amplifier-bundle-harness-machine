# Check Upgrade
# Flat recipe — checks if a generated mini-amplifier is up-to-date with
# the current harness-machine version.
#
# Steps:
#   1. read-version-stamp  — bash: read config.yaml or pyproject.toml fallback
#   2. compare-versions    — upgrade-checker agent: compare and analyze
#   3. present-report      — bash: display formatted report with upgrade instructions
#
# Usage:
#   amplifier run "execute harness-machine:recipes/check-upgrade.yaml
#     with target_path=./my-harness"

name: "check-upgrade"
description: "Check if a generated mini-amplifier harness is up-to-date with the current harness-machine version"
version: "1.0.0"
author: "Harness Machine Bundle"
tags: ["harness", "upgrade", "version", "check"]

context:
  target_path: ""   # Required: path to the generated mini-amplifier directory

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Read Version Stamp
  # Read config.yaml from the target path to extract version information.
  # Falls back to pyproject.toml if config.yaml is not found.
  # ---------------------------------------------------------------------------
  - id: "read-version-stamp"
    type: bash
    command: |
      TARGET="{{target_path}}"
      CONFIG="$TARGET/config.yaml"
      PYPROJECT="$TARGET/pyproject.toml"

      if [ -f "$CONFIG" ]; then
        echo "SOURCE=config.yaml"
        cat "$CONFIG"
      elif [ -f "$PYPROJECT" ]; then
        echo "SOURCE=pyproject.toml"
        cat "$PYPROJECT"
      else
        echo "SOURCE=none"
        echo "ERROR: Neither config.yaml nor pyproject.toml found at $TARGET"
        exit 0
      fi
    output: "config_content"

  # ---------------------------------------------------------------------------
  # Step 2: Compare Versions
  # upgrade-checker agent reads the config content and target path,
  # compares against HARNESS_MACHINE_VERSION, and produces a report.
  # ---------------------------------------------------------------------------
  - id: "compare-versions"
    agent: "harness-machine:upgrade-checker"
    prompt: |
      Check the upgrade status for the mini-amplifier at this path.

      TARGET PATH: {{target_path}}

      CONFIG FILE CONTENT:
      {{config_content}}

      Read context/version.md to get the current HARNESS_MACHINE_VERSION.
      Extract generated_version from the config content above.
      Compare the versions and produce a full upgrade check report.

      Include in your report:
      - target_path
      - current version (generated_version from config, or 'unknown')
      - latest version (HARNESS_MACHINE_VERSION)
      - upgrade_available: yes | no | unknown
      - changes since generation (from changelog)
      - recommendation
      - tier (from config, or 'unknown')
      - deployment_mode (from config, or 'unknown')
    output: "upgrade_report"
    timeout: 120

  # ---------------------------------------------------------------------------
  # Step 3: Present Report
  # Display the upgrade report with human-friendly formatting and
  # instructions for how to upgrade if needed.
  # ---------------------------------------------------------------------------
  - id: "present-report"
    type: bash
    command: |
      echo "========================================================"
      echo "  HARNESS UPGRADE CHECK"
      echo "========================================================"
      echo ""
      echo "Target: {{target_path}}"
      echo ""
      echo "{{upgrade_report}}"
      echo ""
      echo "========================================================"
      echo ""

      # Check if upgrade is available and show instructions
      if echo "{{upgrade_report}}" | grep -qi "upgrade available.*yes\|UPGRADE AVAILABLE"; then
        echo "To upgrade, regenerate the harness with the current harness-machine:"
        echo ""
        echo "  amplifier run \"execute harness-machine:recipes/harness-development-cycle.yaml"
        echo "    with target_description='<your environment description>'"
        echo "    output_dir={{target_path}}\""
        echo ""
        echo "Note: Review generated_version in config.yaml after regeneration to confirm upgrade."
      elif echo "{{upgrade_report}}" | grep -qi "up.to.date\|no upgrade"; then
        echo "No action required — harness is current."
      fi
    output: "formatted_report"
