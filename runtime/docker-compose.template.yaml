services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: {{harness_name}}-agent
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - {{project_root}}:{{project_root}}
