services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: {{harness_name}}-agent
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - {{project_root}}:{{project_root}}:ro
    working_dir: {{project_root}}
    mem_limit: 2g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256m
