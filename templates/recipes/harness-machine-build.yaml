# =============================================================================
# {{project_name}}-harness-machine-build: The Harness Machine Outer Loop
# =============================================================================
#
# This is the meta-recipe -- the "machine" itself. It reads project state,
# dispatches fresh harness generation sessions, and loops until all environments
# have generated harnesses or a blocker is hit.
#
# Each working session starts with zero context, reads STATE.yaml and
# CONTEXT-TRANSFER.md, works on one environment (generate → critique → refine →
# evaluate), persists all state back to files, and exits.
#
# Usage:
#   amplifier tool invoke recipes operation=execute recipe_path={{project_dir}}/.harness-machine/build.yaml
#
# =============================================================================

name: "{{project_name}}-harness-machine-build"
description: "Outer orchestration loop for the {{project_name}} harness machine. Reads state, dispatches generation sessions, persists progress across context windows."
version: "1.0.0"
author: "{{project_name}} Harness Machine"
tags: ["orchestration", "meta-recipe", "harness-machine", "{{project_name}}"]

context:
  state_file: "{{state_file}}"
  context_file: "{{context_file}}"
  status: "healthy"
  session_count: "0"

steps:
  # ---------------------------------------------------------------------------
  # Step 0: Container safety check -- refuse to run on bare host
  # ---------------------------------------------------------------------------
  - id: "container-check"
    type: "bash"
    command: |
      # Check if running inside a container
      if [ ! -f /.dockerenv ] && [ ! -f /run/.containerenv ]; then
          echo "=========================================="
          echo "ERROR: HARNESS MACHINE NOT RUNNING IN CONTAINER"
          echo "=========================================="
          echo ""
          echo "Running harness-machine recipes outside a container is DANGEROUS."
          echo "Autonomous agents have unrestricted filesystem access and can"
          echo "damage files outside the project directory."
          echo ""
          echo "Use: docker compose -f docker-compose.harness-machine.yaml up -d"
          echo ""
          echo "To bypass this check (NOT RECOMMENDED):"
          echo "  export HARNESS_MACHINE_ALLOW_HOST=1"
          echo "=========================================="
          if [ -z "${HARNESS_MACHINE_ALLOW_HOST:-}" ]; then
              exit 1
          fi
          echo "WARNING: HARNESS_MACHINE_ALLOW_HOST is set. Proceeding on bare host."
          echo "YOU ACCEPT ALL RISKS OF FILESYSTEM DAMAGE."
      fi
      echo "Container check passed."
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 1: Read STATE.yaml and extract environment status
  # ---------------------------------------------------------------------------
  - id: "read-state"
    type: "bash"
    command: |
      python3 << 'PYEOF'
      import json, yaml
      try:
          with open("{{state_file}}") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          environments = state.get("environments", {})
          ready_envs = [name for name, env in environments.items()
                        if isinstance(env, dict) and env.get("status") == "ready"]
          done_envs = [name for name, env in environments.items()
                       if isinstance(env, dict) and env.get("status") == "done"]
          in_progress_envs = [name for name, env in environments.items()
                               if isinstance(env, dict) and env.get("status") == "in-progress"]
          result = {
              "phase": state.get("phase", 0),
              "phase_name": state.get("phase_name", "unknown"),
              "epoch": state.get("epoch", 0),
              "next_action": state.get("next_action", ""),
              "blocker_count": len(blockers),
              "blockers": blockers,
              "ready_count": len(ready_envs),
              "done_count": len(done_envs),
              "in_progress_count": len(in_progress_envs),
              "status": "blocked" if blockers else ("complete" if not ready_envs and not in_progress_envs else "healthy")
          }
          print(json.dumps(result))
      except Exception as e:
          print(json.dumps({
              "status": "blocked",
              "blockers": ["Failed to read STATE.yaml: " + str(e)],
              "blocker_count": 1
          }))
      PYEOF
    output: "initial_state"
    parse_json: true

  # ---------------------------------------------------------------------------
  # Step 2: If blockers exist, print them and fail
  # ---------------------------------------------------------------------------
  - id: "check-health"
    type: "bash"
    condition: "{{initial_state.status}} == 'blocked'"
    command: |
      echo "BLOCKED: Cannot proceed. Blockers found:"
      printf '%s\n' '{{initial_state.blockers}}'
      echo ""
      printf '%s\n' "Resolve blockers in {{state_file}} and re-run."
      exit 1
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 3: Main work loop -- calls sub-recipe per iteration
  #
  # Each iteration: orient (read state) -> working session -> evaluate -> post-session.
  # Loop exits when status becomes "blocked" or "complete", or max iterations reached.
  # ---------------------------------------------------------------------------
  - id: "work-loop"
    type: "recipe"
    recipe: "./.harness-machine/iteration.yaml"
    context:
      state_file: "{{state_file}}"
      context_file: "{{context_file}}"
      session_count: "{{session_count}}"
    output: "iteration_result"
    parse_json: true
    timeout: 4200
    on_error: "continue"
    while_condition: "{{status}} == 'healthy'"
    max_while_iterations: {{max_outer_iterations}}
    break_when: "{{status}} != 'healthy'"
    update_context:
      status: "{{iteration_result.iteration_result.status}}"
      session_count: "{{iteration_result.iteration_result.session_count}}"

  # ---------------------------------------------------------------------------
  # Step 4: Final summary
  # ---------------------------------------------------------------------------
  - id: "final-summary"
    type: "bash"
    command: |
      echo ""
      echo "========================================================"
      echo "  {{project_name}} Harness Machine -- Run Complete"
      echo "========================================================"
      echo ""
      echo "  Sessions completed: {{session_count}}"
      echo "  Final status:       {{status}}"
      echo ""
      if [ "{{status}}" = "blocked" ]; then
        echo "  Stopped: BLOCKERS detected"
        echo "  Check {{state_file}} for blocker details."
      elif [ "{{status}}" = "complete" ]; then
        echo "  Completed: All environments have generated harnesses!"
        echo "  Review generated nano-amplifiers in .harness-machine/harnesses/"
      else
        echo "  Stopped: work loop exit (max iterations reached)"
      fi
      echo ""
      echo "  State file:    {{state_file}}"
      echo "  Context file:  {{context_file}}"
      echo ""
      echo "========================================================"
    output: "summary"
